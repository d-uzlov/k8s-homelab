---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vpn-xray

resources:
- ./env/httproute.yaml
- ./backend-tls-policy.yaml
- ../../../ingress/manual-certificates/domain-info/

replacements:
- source:
    kind: ConfigMap
    name: main-domain-info
    fieldPath: data.domain_suffix
  targets:
  - select:
      kind: HTTPRoute
      name: 3xui-public
    options:
      delimiter: .
      index: 1
    fieldPaths:
    - spec.hostnames.0
