---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: grafana

configMapGenerator:
- name: dashboard-3xui-multi-instance
  files:
  - ./multi-instance.json
  options:
    labels:
      grafana.com/dashboard: main
    disableNameSuffixHash: true
- name: dashboard-3xui-instance-details
  files:
  - ./instance.json
  options:
    labels:
      grafana.com/dashboard: main
    disableNameSuffixHash: true
